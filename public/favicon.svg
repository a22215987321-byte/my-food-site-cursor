<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a5af9"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(106,90,249,0.4)"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="100" ry="100" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Chat bubble body -->
  <rect x="112" y="152" width="288" height="200" rx="44" ry="44" fill="white"/>
  <!-- Tail -->
  <polygon points="152,352 112,432 224,368" fill="white"/>
  <!-- Three dots -->
  <circle cx="192" cy="252" r="22" fill="#8b5cf6"/>
  <circle cx="256" cy="252" r="22" fill="#8b5cf6"/>
  <circle cx="320" cy="252" r="22" fill="#8b5cf6"/>
</svg>
